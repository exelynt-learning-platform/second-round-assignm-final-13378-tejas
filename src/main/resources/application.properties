# Server
server.port=8080

# PostgreSQL — set these as environment variables, never hardcode secrets
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ecommerce_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT — minimum 256-bit secret, load from environment
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=3600000

# Stripe — load from environment
stripe.secret.key=${STRIPE_SECRET_KEY}
